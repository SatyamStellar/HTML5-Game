<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Greedy Slots</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Loading Overlay ── -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-logo">🎰</div>
    <div class="loading-title">Greedy Slots</div>
    <div class="loading-spinner"></div>
    <div class="loading-msg" id="overlayMsg">Connecting…</div>
  </div>

  <!-- ── Win Splash ── -->
  <div id="winSplash" class="win-splash hidden">
    <div class="win-splash-inner">
      <div class="win-emoji" id="winEmoji">🎉</div>
      <div class="win-label">YOU WON!</div>
      <div class="win-amount" id="winAmount">+5,000</div>
    </div>
  </div>

  <div class="app-shell">

    <!-- ── Top Bar ── -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo-mark">GS</span>
        <span class="logo-text">Greedy Slots</span>
      </div>
      <div class="topbar-center">
        <span class="round-badge">Round <strong id="roundNumber">1</strong></span>
      </div>
      <div class="topbar-right">
        <div class="balance-pill">
          <span class="balance-icon">🪙</span>
          <strong id="balanceDisplay">--</strong>
        </div>
      </div>
    </header>

    <!-- ── Phase banner (idle / betting / spinning / result) ── -->
    <div class="phase-banner" id="phaseBanner">
      <span id="phaseTxt">Select a chip and place your bets</span>
    </div>

    <!-- ── Slots Grid ── -->
    <main class="slots-grid" id="slotsGrid">
      <!-- slots injected by JS -->
    </main>

    <!-- ── Bet Summary bar ── -->
    <div class="bet-summary" id="betSummary">
      <div class="bet-sum-item">
        <span>Total Bet</span>
        <strong id="totalBetDisplay">0</strong>
      </div>
      <div class="bet-sum-item">
        <span>Slots Selected</span>
        <strong id="slotsSelectedDisplay">0</strong>
      </div>
      <div class="bet-sum-item">
        <span>Potential</span>
        <strong id="potentialDisplay">0</strong>
      </div>
    </div>

    <!-- ── Bottom Controls ── -->
    <footer class="bottom-bar">

      <!-- Chip Rail -->
      <div class="chip-rail" id="chipRail"></div>

      <!-- Start / CTA Button -->
      <button class="start-btn" id="startBtn" disabled>
        <div class="btn-spinner"></div>
        <span class="btn-text">🎰 Start Round</span>
      </button>

    </footer>

  </div><!-- .app-shell -->

  <script src="css/js/game.js"></script>
</body>
</html>
