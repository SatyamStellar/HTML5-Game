<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapori Games</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #22d3ee;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="loader" id="loader"></div>
        <h2 id="message">Loading Game...</h2>
    </div>

    <script>
        function getFirstParamValue(key) {
            const url = new URL(window.location.href);
            const values = url.searchParams.getAll(key).map((value) => value.trim()).filter(Boolean);
            return values.length > 0 ? values[0] : "";
        }

        const gameSlug = getFirstParamValue("gameSlug").toLowerCase();
        
        // Pass all parameters to the destination
        const searchParams = window.location.search;

        if (gameSlug === "snake-and-ladder" || gameSlug === "snake and ladder") {
            window.location.replace("./snake-and-ladder/index.html" + searchParams);
        } else if (gameSlug === "greedy-slots") {
            window.location.replace("./greedy-slots/index.html" + searchParams);
        } else {
            document.getElementById("loader").style.display = "none";
            document.getElementById("message").textContent = "Game not found. Invalid gameSlug.";
        }
    </script>
</body>
</html>
